<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evolvex Nova Foundation</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; scroll-behavior:smooth;}
body{background:#fff;color:#333;}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:linear-gradient(90deg,#ff7b00,#ffcc00);
  position:relative;
  z-index:1000;
}
.logo{display:flex; align-items:center; gap:10px;}
.logo img{height:45px;}
.logo h2{color:#fff;}
nav ul{display:flex; gap:25px; list-style:none;}
nav a{color:#fff; text-decoration:none; font-weight:500;}

/* HAMBURGER */
.hamburger{
  display:none;
  flex-direction:column;
  cursor:pointer;
  gap:5px;
  z-index:1100;
}
.hamburger span{
  width:25px;
  height:3px;
  background:#fff;
  border-radius:2px;
  transition:0.3s;
}
.hamburger.active span:nth-child(1){
  transform:rotate(45deg) translate(5px,5px);
}
.hamburger.active span:nth-child(2){
  opacity:0;
}
.hamburger.active span:nth-child(3){
  transform:rotate(-45deg) translate(6px,-6px);
}

/* MOBILE NAV */
@media(max-width:768px){
  nav ul{
    display:none;
    flex-direction:column;
    width:100%;
    background:linear-gradient(90deg,#ff7b00,#ffcc00);
    position:absolute;
    top:60px;
    left:0;
    padding:20px 0;
    text-align:center;
  }
  nav ul.show{display:flex;}
  .hamburger{display:flex;}
  nav ul li{margin:10px 0;}
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1607746882042-944635dfe10e');
  background-size:cover;
}
.hero h1{font-size:3.2rem;}
.hero p{margin:20px 0;}
.btn{padding:12px 28px;border:none;border-radius:30px;background:linear-gradient(45deg,#ff7b00,#ffd54f);color:#fff;cursor:pointer;font-weight:600;transition:0.3s;margin:5px;}
.btn:hover{transform:scale(1.08); box-shadow:0 8px 20px rgba(0,0,0,0.2);}

/* SECTIONS */
section{padding:70px 20px;text-align:center;animation:fadeIn 1s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);}}
.section-title{font-size:2.3rem;color:#ff7b00;margin-bottom:20px;}

/* CARDS */
.cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:25px;}
.card{background:#fff; padding:25px; border-radius:15px; box-shadow:0 8px 25px rgba(0,0,0,0.08); transition:0.3s;}
.card:hover{transform:translateY(-8px);}
.team img{width:100%; height:260px; object-fit:cover; border-radius:10px;}
.message{font-size:0.95rem; margin-top:10px; color:#555;}
.programs .card{background:linear-gradient(135deg,#fff3e0,#ffe082);}

/* IMPACT */
.impact{
  background:linear-gradient(90deg,#ff7b00,#ffcc00);
  color:#fff;
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  padding:50px 20px;
}
.impact div{margin:20px; font-size:1.5rem;}

/* CONTACT */
.contact-container{display:flex;justify-content:space-between;flex-wrap:wrap;gap:30px;padding:20px;max-width:1000px;margin:0 auto;}
.contact-info, .contact-form{flex:1 1 300px;background:#fff3e0;padding:25px;border-radius:15px;box-shadow:0 8px 25px rgba(0,0,0,0.08);}
.contact-info h3, .contact-form h3{color:#ff7b00;margin-bottom:15px;}
.contact-info p{margin:10px 0;}
.contact-form input, .contact-form textarea{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ccc;outline:none;transition:0.3s;}
.contact-form input:focus, .contact-form textarea:focus{border-color:#ff7b00; box-shadow:0 0 5px rgba(255,123,0,0.4);}
.contact-form textarea{resize:none;height:100px;}

/* FOOTER */
footer{background:#111;color:#fff;text-align:center;padding:30px;}

/* OVERLAY */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center;animation:fadeIn 0.3s ease;}
.form-box{background:#fff;padding:30px;border-radius:15px;width:350px;max-width:90%;position:relative;animation:fadeIn 0.3s ease;}
.form-box h3{margin-bottom:10px;color:#ff7b00;}
.form-group{text-align:left;margin:10px 0;}
.form-group label{font-size:0.85rem;color:#555;}
.form-box input, .form-box select, .form-box textarea{width:100%; padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ccc;outline:none;transition:0.3s;}
.form-box input:focus, .form-box select:focus, .form-box textarea:focus{border-color:#ff7b00; box-shadow:0 0 5px rgba(255,123,0,0.4);}
.form-box textarea{resize:none;height:80px;}
.close{position:absolute;top:10px;right:15px;font-size:20px;cursor:pointer;}

/* MOBILE HERO & NAV */
@media(max-width:768px)
{
.hero h1{font-size:2.2rem;}
.contact-container{flex-direction:column;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="logo">
<img src="logo.png" alt="Evolvex Nova Logo">
<h2>Evolvex Nova</h2>
</div>

<!-- Hamburger Menu -->
<div class="hamburger" onclick="toggleNav(this)">
  <span></span>
  <span></span>
  <span></span>
</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#about">About</a></li>
<li><a href="#team">Leadership</a></li>
<li><a href="#programs">Programs</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<!-- HERO -->
<div class="hero">
<div>
<h1>Empowering Communities. Transforming Futures.</h1>
<p>Education • Healthcare • Innovation • Youth Empowerment</p>
<button class="btn" onclick="openJoin()">Join Us</button>
<button class="btn" onclick="openDonate()">Donate</button>
</div>
</div>

<!-- ABOUT, IMPACT, TEAM, PROGRAMS, SCHOLARSHIP, CONTACT, FOOTER as before -->

<!-- JOIN & DONATE FORMS as before -->
<!-- ... [same as previous code above] ... -->

<script>
/* MOBILE HAMBURGER MENU WITH X */
function toggleNav(hamburger){
  const navLinks = document.querySelector("nav ul");
  navLinks.classList.toggle("show");
  hamburger.classList.toggle("active"); // toggles X animation
}

/* JOIN & DONATE FORM */
function openJoin(){document.getElementById("joinBox").style.display="flex";}
function closeJoin(){document.getElementById("joinBox").style.display="none";}
function openDonate(){document.getElementById("donateBox").style.display="flex";}
function closeDonate(){document.getElementById("donateBox").style.display="none";}
function outsideClick(e,id){if(e.target.id===id){document.getElementById(id).style.display="none";}}
document.addEventListener("keydown",function(e){if(e.key==="Escape"){closeJoin();closeDonate();}});
</script>

</body>
</html>
